<h2>벽 낙서 — 어떤 스타일?</h2>
<p class="subtitle">캐릭터가 벽에 남길 수 있는 낙서 유형을 골라주세요</p>

<div class="cards">

  <div class="card" data-choice="emoji" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#1a1a2e;display:flex;align-items:center;justify-content:center;height:140px;gap:12px;font-size:2.4rem;border-radius:8px;">
      😂 💀 ❤️ 🐾
    </div>
    <div class="card-body">
      <h3>A — 이모지/스탬프</h3>
      <p>미리 정해진 이모지나 도장을 벽에 찍음. 간단하고 귀여운 느낌.</p>
    </div>
  </div>

  <div class="card" data-choice="text" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#1a1a2e;display:flex;align-items:center;justify-content:center;height:140px;border-radius:8px;flex-direction:column;gap:6px;">
      <div style="font-family:monospace;font-size:1.4rem;color:#ff6b6b;text-shadow:2px 2px 0 #c0392b;">캐피바라 왔다감</div>
      <div style="font-family:monospace;font-size:1rem;color:#ffd93d;">← 여기 함정 있음 😈</div>
    </div>
    <div class="card-body">
      <h3>B — 짧은 텍스트 메시지</h3>
      <p>키보드로 짧은 글자를 입력해서 벽에 남김. 다른 플레이어에게 메시지 전달 가능.</p>
    </div>
  </div>

  <div class="card" data-choice="draw" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#1a1a2e;display:flex;align-items:center;justify-content:center;height:140px;border-radius:8px;">
      <svg width="180" height="100" viewBox="0 0 180 100">
        <path d="M20,80 Q50,20 90,50 Q130,80 160,30" stroke="#ff6b6b" stroke-width="4" fill="none" stroke-linecap="round"/>
        <path d="M30,60 Q60,40 80,70" stroke="#ffd93d" stroke-width="3" fill="none" stroke-linecap="round"/>
        <circle cx="140" cy="60" r="15" stroke="#74b9ff" stroke-width="3" fill="none"/>
      </svg>
    </div>
    <div class="card-body">
      <h3>C — 자유 드로잉</h3>
      <p>마우스/터치로 벽에 직접 그림. 가장 자유롭지만 구현 복잡도 높음.</p>
    </div>
  </div>

</div>
