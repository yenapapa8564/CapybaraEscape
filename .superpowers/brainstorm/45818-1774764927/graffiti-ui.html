<h2>낙서 UI — 어떤 방식?</h2>
<p class="subtitle">스프레이 캔 아이템 사용 시 그리기 화면이 어떻게 나올지 골라주세요</p>

<div class="split" style="gap:20px;align-items:flex-start;">

  <!-- Option A -->
  <div class="mockup" style="flex:1;" data-choice="overlay" onclick="toggleSelect(this)">
    <div class="mockup-header">A — 화면 오버레이 캔버스</div>
    <div class="mockup-body" style="background:#111;padding:0;overflow:hidden;border-radius:0 0 8px 8px;position:relative;">
      <!-- 게임 배경 (흐릿하게) -->
      <div style="background:linear-gradient(180deg,#2d5a27 0%,#8B7355 60%,#6b5a3e 100%);height:180px;filter:blur(2px);opacity:0.5;"></div>
      <!-- 오버레이 캔버스 -->
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;">
        <div style="background:rgba(0,0,0,0.7);color:#fff;font-size:0.7rem;padding:6px 10px;text-align:center;">🎨 벽에 낙서하기 — ESC로 닫기</div>
        <div style="flex:1;border:2px dashed rgba(255,255,255,0.3);margin:8px;border-radius:4px;display:flex;align-items:center;justify-content:center;">
          <svg width="160" height="100" viewBox="0 0 160 100" style="opacity:0.8">
            <path d="M20,70 Q40,30 70,50 Q100,70 130,25" stroke="#ff6b6b" stroke-width="3" fill="none" stroke-linecap="round"/>
            <path d="M30,80 Q55,60 75,75" stroke="#ffd93d" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          </svg>
        </div>
        <!-- 색상 팔레트 -->
        <div style="display:flex;justify-content:center;gap:8px;padding:8px;background:rgba(0,0,0,0.8);">
          <div style="width:22px;height:22px;border-radius:50%;background:#ff6b6b;border:2px solid white;"></div>
          <div style="width:22px;height:22px;border-radius:50%;background:#ffd93d;border:2px solid rgba(255,255,255,0.3);"></div>
          <div style="width:22px;height:22px;border-radius:50%;background:#74b9ff;border:2px solid rgba(255,255,255,0.3);"></div>
          <div style="width:22px;height:22px;border-radius:50%;background:#55efc4;border:2px solid rgba(255,255,255,0.3);"></div>
          <div style="width:22px;height:22px;border-radius:50%;background:#fff;border:2px solid rgba(255,255,255,0.3);"></div>
          <div style="width:34px;height:22px;border-radius:4px;background:#333;color:#fff;font-size:0.6rem;display:flex;align-items:center;justify-content:center;border:1px solid #666;">완료</div>
        </div>
      </div>
    </div>
    <div style="padding:8px 12px;font-size:0.8rem;color:#aaa;">화면 전체가 캔버스. 게임이 잠시 멈추고 그림 그린 뒤 완료 버튼으로 벽에 붙임.</div>
  </div>

  <!-- Option B -->
  <div class="mockup" style="flex:1;" data-choice="3d" onclick="toggleSelect(this)">
    <div class="mockup-header">B — 벽 표면에 직접 그리기</div>
    <div class="mockup-body" style="background:#111;padding:0;overflow:hidden;border-radius:0 0 8px 8px;position:relative;">
      <!-- 게임 씬 -->
      <div style="height:180px;background:linear-gradient(180deg,#1a1a2e 0%,#2d5a27 70%);position:relative;overflow:hidden;">
        <!-- 벽 -->
        <div style="position:absolute;left:60px;top:10px;width:110px;height:140px;background:#8B7355;border:2px solid #6b5a3e;border-radius:2px;">
          <!-- 벽 위 낙서 -->
          <svg width="110" height="140" style="position:absolute;inset:0">
            <path d="M15,90 Q35,50 60,70 Q85,90 100,45" stroke="#ff6b6b" stroke-width="3" fill="none" stroke-linecap="round"/>
          </svg>
          <!-- 크로스헤어 커서 -->
          <div style="position:absolute;top:40%;left:55%;width:14px;height:14px;transform:translate(-50%,-50%);">
            <div style="position:absolute;top:6px;left:0;width:14px;height:2px;background:rgba(255,255,255,0.9);"></div>
            <div style="position:absolute;left:6px;top:0;width:2px;height:14px;background:rgba(255,255,255,0.9);"></div>
          </div>
        </div>
        <!-- 색상 선택 (화면 하단) -->
        <div style="position:absolute;bottom:6px;left:50%;transform:translateX(-50%);display:flex;gap:6px;background:rgba(0,0,0,0.6);padding:4px 8px;border-radius:20px;">
          <div style="width:18px;height:18px;border-radius:50%;background:#ff6b6b;border:2px solid white;"></div>
          <div style="width:18px;height:18px;border-radius:50%;background:#ffd93d;"></div>
          <div style="width:18px;height:18px;border-radius:50%;background:#74b9ff;"></div>
          <div style="width:18px;height:18px;border-radius:50%;background:#fff;"></div>
        </div>
        <!-- 안내 텍스트 -->
        <div style="position:absolute;top:6px;left:0;right:0;text-align:center;font-size:0.6rem;color:rgba(255,255,255,0.7);">벽을 클릭해서 그리기 | Q 완료</div>
      </div>
    </div>
    <div style="padding:8px 12px;font-size:0.8rem;color:#aaa;">캐릭터가 벽 앞에 서면 벽 위에 바로 그림. 게임이 멈추지 않아 사냥꾼이 와도 위험!</div>
  </div>

</div>
